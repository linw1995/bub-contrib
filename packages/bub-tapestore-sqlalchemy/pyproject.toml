[project]
name = "bub-tapestore-sqlalchemy"
version = "0.1.0"
description = "SQLAlchemy tape store plugin for Bub"
readme = "README.md"
authors = [
    { name = "Chojan Shang", email = "psiace@apache.org" }
]
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0.0",
]

[project.entry-points.bub]
tapestore-sqlalchemy = "bub_tapestore_sqlalchemy.plugin"

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"
